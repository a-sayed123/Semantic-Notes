<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor</title>
  </head>
  <body>
    <section class="wanted-links">
      <!-- first link -->
      <a href="/profile.html" rel="noopener">profile settings</a>

      <!-- second link -->
      <a
        href="q2-report.pdf"
        rel="noopener"
        type="application/pdf"
        ping="https://analytics.fatih.com/track"
        >reports-monitor</a
      >

      <!-- third link -->
      <a
        href="https://competitor.com/study"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="visite competitor page site"
        >competitor</a
      >

      <!-- forth link -->
      <a
        href="https://crypto-invest.com"
        target="_blank"
        rel="noopener nofollow"
        aria-label="visite sponsore site"
        >sponsor link</a
      >

      <!-- fifth link -->
      <a
        href="https://friendly-books.com/clean-code.pdf"
        aria-label="downloading page link"
        target="_blank"
        rel="noopener"
        referrerpolicy="origin"
        >download clean code pdf</a
      >
    </section>
  </body>
</html>
